apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyseerr
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyseerr
  template:
    metadata:
      labels:
        app: jellyseerr
    spec:
      containers:
        - name: jellyseerr
          image: fallenbagel/jellyseerr:latest
          ports:
            - containerPort: 5055
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: TZ
              value: "Etc/UTC"
          volumeMounts:
            - name: config
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /
              port: 5055
            initialDelaySeconds: 30
            periodSeconds: 10
      initContainers:
        - name: wait-for-jellyfin
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -q --spider http://jellyfin.media.svc.cluster.local:8096/health; do sleep 5; done']
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyseerr-config-pvc
