apiVersion: v1
kind: Service
metadata:
  name: gluetun-svc
  namespace: media
spec:
  selector:
    app: gluetun
  ports:
    - name: socks5
      port: 8388
      targetPort: 8388
    - name: http-proxy
      port: 8888
      targetPort: 8888
    - name: health
      port: 9999
      targetPort: 9999
