global:
  domain: argocd.media.home

redis-ha:
  enabled: false

redis:
  enabled: true

dex:
  enabled: false

redisSecretInit:
  enabled: true

server:
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: traefik

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

applicationSet:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

configs:
  params:
    server.insecure: true  # Disable TLS on the server pod; Traefik handles routing
    kustomize.buildOptions: --enable-helm  # Allow Kustomize Helm chart inflation
