global:
  domain: argocd.zion.home

redis-ha:
  enabled: false

redis:
  enabled: false

dex:
  enabled: false

redisSecretInit:
  enabled: false

server:
  replicas: 0

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

applicationSet:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

configs:
  params:
    redis.server: ""                      # Disable Redis connection attempts
    kustomize.buildOptions: --enable-helm  # Allow Kustomize Helm chart inflation
