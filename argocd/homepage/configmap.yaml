apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: media
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Media Stack
    favicon: https://gethomepage.dev/favicon.ico
    headerStyle: clean
    layout:
      Media:
        style: row
        columns: 3
      Downloads:
        style: row
        columns: 3
      Management:
        style: row
        columns: 2
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: ""
  services.yaml: |
    - Media:
        - Jellyfin:
            icon: jellyfin.png
            href: http://jellyfin.media.home
            description: Media Server
            siteMonitor: http://jellyfin.media.svc.cluster.local:8096
        - Jellyseerr:
            icon: jellyseerr.png
            href: http://jellyseerr.media.home
            description: Media Requests
            siteMonitor: http://jellyseerr.media.svc.cluster.local:5055
    - Downloads:
        - Sonarr:
            icon: sonarr.png
            href: http://sonarr.media.home
            description: TV Shows
            siteMonitor: http://sonarr.media.svc.cluster.local:8989
        - Radarr:
            icon: radarr.png
            href: http://radarr.media.home
            description: Movies
            siteMonitor: http://radarr.media.svc.cluster.local:7878
        - Prowlarr:
            icon: prowlarr.png
            href: http://prowlarr.media.home
            description: Indexer Manager
            siteMonitor: http://prowlarr.media.svc.cluster.local:9696
        - qBittorrent:
            icon: qbittorrent.png
            href: http://bittorrent.media.home
            description: Torrent Client
            siteMonitor: http://qbittorrent.media.svc.cluster.local:8080
    - Management:
        - ArgoCD:
            icon: argocd.png
            href: http://argocd.media.home
            description: GitOps
        - Traefik:
            icon: traefik.png
            href: http://traefik.media.home
            description: Reverse Proxy
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
