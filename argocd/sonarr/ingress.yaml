apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr-ingress
  namespace: media
  annotations:
    argocd.argoproj.io/health-check: "skip"
spec:
  ingressClassName: traefik
  rules:
    - host: sonarr.zion.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sonarr-svc
                port:
                  name: http
