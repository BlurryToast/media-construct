# Persistent Volumes and Claims for the media stack
# PVs are cluster-scoped; PVCs are in the 'media' namespace
# All use hostPath (single-node cluster) with Retain reclaim policy
# Sync wave 0 ensures storage is ready before workloads deploy
---
# ============================================================
# Shared Volumes (ReadWriteMany)
# ============================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-pv
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /data/media
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: ""
  volumeName: media-pv
---
