apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/BlurryToast/media-construct.git
        revision: main
        directories:
          - path: argocd/*
          - path: argocd/traefik
            exclude: true
        values:
          destNamespace: media
    - list:
        elements:
          - path: argocd/traefik
            path.basename: traefik
            values.destNamespace: ingress
          - path: argocd/argocd
            path.basename: argocd
            values.destNamespace: argocd
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/BlurryToast/media-construct.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{values.destNamespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
